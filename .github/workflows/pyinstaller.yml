name: Build Desktop App (PyInstaller)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name pyTome --collect-data pytome run.py

      - name: Validate build output (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          test -d "dist/pyTome.app"

      - name: Validate build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/pyTome.exe")) { throw "dist/pyTome.exe not found" }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyTome-${{ runner.os }}
          path: |
            dist/pyTome.app
            dist/pyTome.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pyTome-macOS
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pyTome-Windows
          path: release-assets/windows

      - name: Archive artifacts
        shell: bash
        run: |
          cd release-assets
          if [ -d "macos/pyTome.app" ]; then
            zip -r pyTome-macOS.zip macos/pyTome.app
          fi
          if [ -f "windows/pyTome.exe" ]; then
            zip -j pyTome-Windows.zip windows/pyTome.exe
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/pyTome-macOS.zip
            release-assets/pyTome-Windows.zip
