name: Build Desktop App (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    name: windows-latest build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name pyTome --paths src --add-data "src/pytome/data;pytome/data" run.py

      - name: Validate build output (Windows)
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/pyTome/pyTome.exe")) { throw "dist/pyTome/pyTome.exe not found" }

      - name: Package build artifact (Windows)
        shell: pwsh
        run: |
          if (Test-Path "release-assets") { Remove-Item -Recurse -Force "release-assets" }
          New-Item -ItemType Directory -Path "release-assets" | Out-Null
          Compress-Archive -Path "dist/pyTome/*" -DestinationPath "release-assets/pyTome-Windows.zip"

      - name: Upload build artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: pyTome-Windows
          path: release-assets/pyTome-Windows.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pyTome-Windows
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/pyTome-Windows.zip
